name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        run: rustup show

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Build documentation
        shell: bash
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

  features:
    name: Feature checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        run: rustup show

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Check default feature set
        run: cargo check --workspace

      - name: Check all features
        run: cargo check --workspace --all-features

      - name: Check core crate without default features
        run: cargo check -p icap-rs --no-default-features
