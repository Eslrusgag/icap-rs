name: release-plz

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  id-token: write   # crates.io Trusted Publishing (OIDC)

# Never run two release flows at once on the same ref.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Publishes `icap-rs` to crates.io and creates the git tag + GitHub Release
  # whenever the version in Cargo.toml is not yet on the registry.
  release:
    name: release-plz release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auth to crates.io uses Trusted Publishing (OIDC) via `id-token: write`
          # above — no long-lived token needed once the trusted publisher is
          # configured on crates.io. Token fallback: uncomment the next line and
          # add a `CARGO_REGISTRY_TOKEN` repository secret.
          # CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Opens/updates the "Release PR" (version bump + CHANGELOG) from new commits.
  release-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # A GitHub App token or PAT lets the Release PR trigger CI workflows.
          # Falls back to GITHUB_TOKEN (PR still opens, but won't trigger CI).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
