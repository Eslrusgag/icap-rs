http_port 3128
visible_hostname squid-icap-rs-demo

# Demo-only proxy access. Do not reuse this ACL in production.
http_access allow all

access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

icap_enable on
icap_preview_enable on
icap_preview_size 1024
icap_persistent_connections on
icap_send_client_ip on
icap_send_client_username off
icap_service_failure_limit -1

# Fail closed: if icap-rs rejects the wire format or is unavailable, Squid
# returns an error instead of silently bypassing the ICAP service.
icap_service icap_rs_reqmod reqmod_precache bypass=0 icap://192.168.65.254:1344/reqmod
icap_service icap_rs_respmod respmod_precache bypass=0 icap://192.168.65.254:1344/respmod

adaptation_access icap_rs_reqmod allow all
adaptation_access icap_rs_respmod allow all
