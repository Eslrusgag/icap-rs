# release-plz configuration — https://release-plz.dev/docs/config
#
# Only the `icap-rs` library crate is published to crates.io. The two binary
# crates are release-disabled here (and carry `publish = false` in their own
# manifests as a second guard).

[workspace]
# Prepend new versions to the existing hand-written CHANGELOG.md.
changelog_update = true
# Match the existing tag style (`v0.2.0`) instead of the workspace default
# `{name}-v{version}`. Only one crate is released, so a bare v-tag is unambiguous.
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

[[package]]
name = "icap-rs"
release = true

[[package]]
name = "rs-icap-client"
release = false

[[package]]
name = "rs-icap-server"
release = false
